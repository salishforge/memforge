version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: memforge
      POSTGRES_USER: memforge
      POSTGRES_PASSWORD: memforge
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memforge -d memforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  memforge:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memforge:memforge@postgres:5432/memforge
      PORT: 3333
    ports:
      - "3333:3333"

volumes:
  pgdata:
